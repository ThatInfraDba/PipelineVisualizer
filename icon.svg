<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#667eea" opacity="0.15"/>
  
  <!-- Pipeline flow -->
  <g transform="translate(20, 30)">
    <!-- Start node -->
    <circle cx="8" cy="8" r="8" fill="#4A90E2"/>
    
    <!-- Arrow 1 -->
    <line x1="16" y1="8" x2="32" y2="8" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <polygon points="30,5 36,8 30,11" fill="#ffffff"/>
    
    <!-- Node 1 (Build) -->
    <rect x="36" y="0" width="16" height="16" rx="3" fill="#4A90E2"/>
    
    <!-- Arrow 2 -->
    <line x1="52" y1="8" x2="68" y2="8" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <polygon points="66,5 72,8 66,11" fill="#ffffff"/>
    
    <!-- Node 2 (Test) -->
    <rect x="72" y="0" width="16" height="16" rx="3" fill="#7ED321"/>
    
    <!-- Second row -->
    <!-- Arrow down from Node 2 -->
    <line x1="80" y1="16" x2="80" y2="32" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <polygon points="77,30 80,36 83,30" fill="#ffffff"/>
    
    <!-- Node 3 (Deploy) -->
    <rect x="72" y="36" width="16" height="16" rx="3" fill="#F5A623"/>
    
    <!-- Arrow 3 -->
    <line x1="68" y1="44" x2="52" y2="44" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <polygon points="54,41 48,44 54,47" fill="#ffffff"/>
    
    <!-- Node 4 (Monitor) -->
    <rect x="36" y="36" width="16" height="16" rx="3" fill="#9013FE"/>
    
    <!-- Arrow 4 -->
    <line x1="32" y1="44" x2="16" y2="44" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <polygon points="18,41 12,44 18,47" fill="#ffffff"/>
    
    <!-- End node -->
    <circle cx="8" cy="44" r="8" fill="#50E3C2"/>
  </g>
  
  <!-- Document/YAML representation -->
  <g transform="translate(15, 78)">
    <!-- Document icon -->
    <rect x="0" y="0" width="24" height="30" rx="2" fill="#ffffff" opacity="0.9"/>
    <line x1="4" y1="6" x2="20" y2="6" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>
    <line x1="4" y1="11" x2="20" y2="11" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>
    <line x1="4" y1="16" x2="16" y2="16" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>
    <line x1="4" y1="21" x2="18" y2="21" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>
    <line x1="4" y1="26" x2="12" y2="26" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Graph/visualization representation -->
  <g transform="translate(89, 78)">
    <!-- Bar chart icon -->
    <rect x="0" y="15" width="6" height="15" rx="1" fill="#4A90E2"/>
    <rect x="9" y="8" width="6" height="22" rx="1" fill="#7ED321"/>
    <rect x="18" y="12" width="6" height="18" rx="1" fill="#F5A623"/>
  </g>
  
  <!-- Outer ring -->
  <circle cx="64" cy="64" r="60" fill="none" stroke="#667eea" stroke-width="4" opacity="0.3"/>
</svg>
